apiVersion: apps/v1
kind: Deployment
metadata:
  name: nano-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nano-backend
  template:
    metadata:
      labels:
        app: nano-backend
    spec:
      containers:
        - name: nano-backend
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: nano-backend-service
spec:
  type: NodePort
  selector:
    app: nano-backend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30007
